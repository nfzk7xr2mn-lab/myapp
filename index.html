<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dein Tag. Deine Richtung. Deine Entscheidungen.</title>
  <link rel="icon" type="image/png" sizes="32x32" href="data/favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260424ak" />
</head>
<body>
  <div id="app">

    <!-- HEADER -->
    <header id="header">
      <div id="header-left">
        <img src="data/logo_64.png" alt="Logo" id="header-logo" />
        <div id="clock"></div>
        <div id="date-label"></div>
      </div>
      <div id="phase-badge"></div>
      <div id="header-right">
        <div id="header-quote"></div>
        <button id="btn-refresh-quote" class="btn-mode" title="Neues Zitat">⟳</button>
        <div id="server-status" title="write-server"></div>
        <button id="btn-mode-toggle-expert" class="btn-mode" title="Fokusmodus (E)" onclick="cycleMode()">⊟</button>
      </div>
    </header>

    <!-- SIMPLE BAR (Grundmodus) -->
    <div id="simple-bar">
      <div id="sb-clock"></div>
      <div id="sb-date"></div>
      <div id="sb-phase"></div>
      <div class="sb-sep"></div>
      <div id="sb-cal"></div>
      <button id="btn-refresh-cal" title="Kalender aktualisieren">⟳</button>
      <div class="sb-sep"></div>
      <div id="sb-badges"></div>
      <button id="btn-mode-toggle" title="Expertenmodus (E)">⊞</button>
    </div>

    <!-- MAIN TILES -->
    <main id="tiles">

      <!-- TILE 1: DATEN -->
      <section class="tile" id="tile-kalender">
        <div class="tile-header">
          <span class="tile-title">Kalender</span>
          <span class="tile-sub" id="cal-date"></span>
        </div>
        <div class="tile-body" id="cal-body"></div>
        <div class="tile-footer"><button class="btn-ghost" id="btn-refresh-cal-expert" title="Kalender aus Outlook neu exportieren">⟳ Aktualisieren</button></div>
      </section>

      <!-- TILE 2: INFO -->
      <section class="tile" id="tile-fokus">
        <div class="tile-header">
          <span class="tile-title">Info</span>
          <span class="tile-sub" id="fokus-kategorie"></span>
        </div>
        <div class="fokus-tabs">
          <button class="fokus-tab" data-tab="links"    onclick="switchFokusTab('links')">Links</button>
          <button class="fokus-tab" data-tab="notizen"  onclick="switchFokusTab('notizen')">Notizen</button>
          <button class="fokus-tab" data-tab="jira"     onclick="switchFokusTab('jira')">Jira</button>
          <button class="fokus-tab" data-tab="netzwerk" onclick="switchFokusTab('netzwerk')">Netzwerk</button>
          <button class="fokus-tab" data-tab="ziele"    onclick="switchFokusTab('ziele')">Ziele</button>
          <button class="fokus-tab" data-tab="wissen"   onclick="switchFokusTab('wissen')">Wissen</button>
          <button class="fokus-tab" data-tab="videos"   onclick="switchFokusTab('videos')">Videos</button>
          <button class="fokus-tab" data-tab="news"     onclick="switchFokusTab('news')">Neues</button>
        </div>
        <div class="tile-body" id="fokus-body"></div>
        <div class="tile-footer">
          <button class="btn-ghost" id="btn-add-notiz" style="display:none">+ Notiz</button>
          <button class="btn-ghost" id="btn-plan-next-day" style="display:none">⟳ Planung</button>
          <button class="btn-ghost" id="btn-add-learn" style="display:none">+ Link</button>
          <button class="btn-ghost" id="btn-add-contact" style="display:none">+ Kontakt</button>
          <button class="btn-ghost" id="btn-sync-jira" style="display:none">⟳ Synchronisieren</button>
          <button class="btn-ghost" id="btn-refresh-ziele" style="display:none">⟳ Aktualisieren</button>
          <button class="btn-ghost" id="btn-refresh-news" style="display:none">⟳ Aktualisieren</button>
          <button class="btn-ghost" id="btn-add-video" style="display:none">+ Video</button>
          <button class="btn-ghost" id="btn-fokus-placeholder" style="border-color:transparent;color:transparent">&nbsp;</button>
        </div>
      </section>

      <!-- TILE 3: AKTIONEN -->
      <section class="tile" id="tile-actions">
        <div class="tile-header">
          <span class="tile-title">Aktionen</span>
          <span class="tile-sub" id="actions-count"></span>
        </div>
        <div class="actions-tabs">
          <button class="actions-tab active" data-tab="open" onclick="switchActionsTab('open')">Offen</button>
          <button class="actions-tab" data-tab="done" onclick="switchActionsTab('done')">Erledigt</button>
        </div>
        <div class="tile-body" id="actions-body"></div>
        <div class="tile-footer">
          <button class="btn-ghost" id="btn-add-action">+ Aktion erfassen</button>
        </div>
      </section>

      <!-- TILE 4: MAILS -->
      <section class="tile" id="tile-mails">
        <div class="tile-header">
          <span class="tile-title">Mails</span>
          <span class="tile-sub" id="mails-count"></span>
          <span class="tile-sub" id="mail-sync-status" style="margin-left:auto;font-size:0.62rem;color:var(--text-muted)"></span>
        </div>
        <div class="mail-tabs" id="mail-tabs"></div>
        <div class="tile-body" id="mails-body">
          <div style="color:var(--text-muted);font-size:0.75rem;padding:8px 0">Wird geladen…</div>
        </div>
        <div class="tile-footer" style="display:flex;gap:8px;align-items:center">
          <button class="btn-ghost" id="btn-summarize-mails">⟳ Zusammenfassen</button>
          <button class="btn-ghost" id="btn-show-summary" style="display:none"></button>
        </div>
      </section>

    </main>

  </div>

  <!-- MODAL: Neue Aktion -->
  <div class="modal-overlay" id="modal-action" style="display:none">
    <div class="modal">
      <div class="modal-title">Neue Aktion</div>
      <input class="modal-input" id="new-action-text" placeholder="Beschreibung…" />
      <input class="modal-input" id="new-action-due" placeholder="Fällig DD.MM. (leer = heute)" />
      <div class="modal-buttons">
        <button class="btn-primary" id="btn-save-action">Speichern</button>
        <button class="btn-ghost" onclick="closeModal('modal-action')">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Neue Notiz -->
  <div class="modal-overlay" id="modal-notiz" style="display:none" onclick="if(event.target===this)closeModal('modal-notiz')">
    <div class="modal">
      <div class="modal-title">Neue Notiz</div>
      <input class="modal-input" id="new-notiz-titel" placeholder="Überschrift…" />
      <textarea class="modal-input modal-textarea" id="new-notiz-text" placeholder="Notiz…" rows="5"></textarea>
      <div class="modal-buttons">
        <button class="btn-primary" id="btn-save-notiz">Speichern</button>
        <button class="btn-ghost" onclick="closeModal('modal-notiz')">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Neuer Link -->
  <div class="modal-overlay" id="modal-link" style="display:none">
    <div class="modal">
      <div class="modal-title">Neuer Link</div>
      <input class="modal-input" id="new-link-label" placeholder="Bezeichnung…" />
      <input class="modal-input" id="new-link-url" placeholder="URL…" />
      <div class="modal-buttons">
        <button class="btn-primary" id="btn-save-link">Speichern</button>
        <button class="btn-ghost" onclick="closeModal('modal-link')">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Sync Mails -->
  <div class="modal-overlay" id="modal-sync" style="display:none" onclick="if(event.target===this)closeModal('modal-sync')">
    <div class="modal" style="min-width:520px;max-width:720px;max-height:80vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="modal-title" id="modal-sync-title"></div>
        <button class="btn-ghost" onclick="closeModal('modal-sync')">✕</button>
      </div>
      <div id="modal-sync-body"></div>
    </div>
  </div>

  <!-- MODAL: Netzwerk Kontakt bearbeiten -->
  <div class="modal-overlay" id="modal-netzwerk" style="display:none" onclick="if(event.target===this)closeModal('modal-netzwerk')">
    <div class="modal">
      <div class="modal-title">Kontakt bearbeiten</div>
      <div id="modal-netzwerk-name" style="font-size:0.8rem;color:var(--gold);margin-bottom:6px;font-weight:600"></div>
      <textarea class="modal-input modal-textarea" id="edit-netzwerk-rolle" placeholder="Rolle / Notizen..." rows="3"></textarea>
      <div class="modal-buttons">
        <button class="btn-primary" id="btn-save-netzwerk">Speichern</button>
        <button class="btn-ghost" onclick="closeModal('modal-netzwerk')">Abbrechen</button>
        <button class="btn-ghost" id="btn-delete-netzwerk" style="margin-left:auto;color:#e74c3c;border-color:rgba(231,76,60,0.3)">Entfernen</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Neuer Kontakt -->
  <div class="modal-overlay" id="modal-add-contact" style="display:none" onclick="if(event.target===this)closeModal('modal-add-contact')">
    <div class="modal">
      <div class="modal-title">Neuer Kontakt</div>
      <input class="modal-input" id="new-contact-name" placeholder="Vorname Nachname..." />
      <textarea class="modal-input modal-textarea" id="new-contact-rolle" placeholder="Rolle / Notizen..." rows="3"></textarea>
      <div class="modal-buttons">
        <button class="btn-primary" id="btn-save-new-contact">Speichern</button>
        <button class="btn-ghost" onclick="closeModal('modal-add-contact')">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Neues Video -->
  <div class="modal-overlay" id="modal-video" style="display:none" onclick="if(event.target===this)closeModal('modal-video')">
    <div class="modal">
      <div class="modal-title">Neues Video</div>
      <input class="modal-input" id="new-video-url" placeholder="URL (YouTube oder Webseite)..." />
      <input class="modal-input" id="new-video-title" placeholder="Titel..." />
      <select class="modal-input" id="new-video-category">
        <option value="Tech">Tech</option>
        <option value="Leadership">Leadership</option>
        <option value="Wissenschaft">Wissenschaft</option>
        <option value="Inspiration">Inspiration</option>
        <option value="Lernen">Lernen</option>
        <option value="Andere">Andere</option>
      </select>
      <div class="modal-buttons">
        <button class="btn-primary" id="btn-save-video">Speichern</button>
        <button class="btn-ghost" onclick="closeModal('modal-video')">Abbrechen</button>
      </div>
    </div>
  </div>

  <script src="script.js?v=20260424ah"></script>
</body>
</html>
