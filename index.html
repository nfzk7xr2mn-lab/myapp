<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Fokus Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div id="clock">00:00</div>
        <div id="date-string">Lade Datum...</div>
        <div id="phase-task">Lade Phase...</div>
    </header>

    <main class="dashboard">
        <section class="card" id="cal-card">
            <h3>Termine & Zeitplan</h3>
            <div id="cal-info"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <a href="https://outlook.office.com/calendar/view/day" target="_blank" class="action-button">Outlook</a>
                <button class="action-button" onclick="openWeeklyScreenshot()">Wochenplan</button>
            </div>
        </section>

        <section class="card" id="impulse-card">
            <h3>Fokus & Impulse</h3>
            <div id="content-box"></div>
        </section>

        <section class="card" id="action-card">
            <h3>Tagesziele & Progress</h3>
            <div id="action-item-list"></div>
        </section>
    </main>

    <nav class="nav-buttons">
        <button onclick="openWeeklyScreenshot()">Plan</button>
        <button onclick="logAction('Review gestartet')">Review</button>
        <button onclick="toggleFocus()">Fokus</button>
        <button onclick="toggleSettings()">⚙️</button>
    </nav>

    <div id="screenshot-modal" onclick="this.style.display='none'">
        <img id="weekly-img" src="">
    </div>

    <div id="settings-panel">
        <h3 style="color:white; margin-bottom:15px;">Einstellungen</h3>
        <div id="settings-list"></div>
        <button class="action-button" onclick="toggleSettings()" style="width:100%;">Schließen</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
