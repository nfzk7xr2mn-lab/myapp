<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Fokus Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- HEADER -->
    <header id="header">
      <div id="header-left">
        <div id="clock"></div>
        <div id="date-label"></div>
      </div>
      <div id="phase-badge"></div>
    </header>

    <!-- MAIN TILES -->
    <main id="tiles">

      <!-- TILE 1: KALENDER -->
      <section class="tile" id="tile-kalender">
        <div class="tile-header">
          <span class="tile-icon">📅</span>
          <span class="tile-title">Kalender</span>
          <span class="tile-sub" id="cal-date"></span>
        </div>
        <div class="tile-body" id="cal-body"></div>
      </section>

      <!-- TILE 2: FOKUS -->
      <section class="tile" id="tile-fokus">
        <div class="tile-header">
          <span class="tile-icon">🎯</span>
          <span class="tile-title">Fokus</span>
          <span class="tile-sub" id="fokus-kategorie"></span>
        </div>
        <div class="tile-body" id="fokus-body"></div>
        <div class="tile-footer">
          <button class="btn-ghost" id="btn-add-learn">+ Link hinzufügen</button>
        </div>
      </section>

      <!-- TILE 3: ACTIONS -->
      <section class="tile" id="tile-actions">
        <div class="tile-header">
          <span class="tile-icon">⚡</span>
          <span class="tile-title">Actions</span>
          <span class="tile-sub" id="actions-count"></span>
        </div>
        <div class="tile-body" id="actions-body"></div>
        <div class="tile-footer">
          <button class="btn-ghost" id="btn-add-action">+ Action erfassen</button>
        </div>
      </section>

    </main>

  </div>

  <!-- MODAL: Neue Action -->
  <div class="modal-overlay" id="modal-action" style="display:none">
    <div class="modal">
      <div class="modal-title">Neue Action</div>
      <input class="modal-input" id="new-action-text" placeholder="Beschreibung…" />
      <input class="modal-input" id="new-action-due" placeholder="Fällig DD.MM. (leer = heute)" />
      <div class="modal-buttons">
        <button class="btn-primary" id="btn-save-action">Speichern</button>
        <button class="btn-ghost" onclick="closeModal('modal-action')">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Neuer Learn-Link -->
  <div class="modal-overlay" id="modal-learn" style="display:none">
    <div class="modal">
      <div class="modal-title">Neuer Lernlink</div>
      <select class="modal-input" id="new-learn-kat">
        <option>Führung</option>
        <option>Presentation</option>
        <option>Verhandlungen</option>
        <option>Rhetorik</option>
        <option>KI</option>
        <option>Naturwissenschaften</option>
        <option>Dehnübungen für Frauen über 50</option>
        <option>kurze Yogaübungen</option>
        <option>kurze Sporteinheiten mit den eigenen Körper ohne Hilfsmittel</option>
      </select>
      <input class="modal-input" id="new-learn-url" placeholder="URL…" />
      <div class="modal-buttons">
        <button class="btn-primary" id="btn-save-learn">Speichern</button>
        <button class="btn-ghost" onclick="closeModal('modal-learn')">Abbrechen</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
