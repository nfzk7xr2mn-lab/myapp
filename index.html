<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myapp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div id="clock">00:00</div>
        <div id="date-string">Lade Datum...</div>
        <button class="action-button" onclick="toggleSettings()">⚙ Zeiten & Namen</button>
    </header>

    <main class="dashboard-grid">
        <div class="card">
            <h2>Impuls</h2>
            <p id="phase-task">Warten auf Zeit...</p>
            <button class="action-button" onclick="logAction('Impuls bestätigt')">Fokus</button>
        </div>
        <div class="card">
            <h2>Kalender</h2>
            <p id="cal-info">KW --</p>
            <button class="action-button">Details</button>
        </div>
        <div class="card">
            <h2>Resümee</h2>
            <p>Action-Items sichten.</p>
            <button class="action-button">Review</button>
        </div>
        <div class="card">
            <h2>Elan</h2>
            <p>5 Min. Mobilisation.</p>
            <button class="action-button" onclick="logAction('Elan-Einheit')">Start</button>
        </div>
    </main>

    <div id="settings-panel">
        <h2 style="color:var(--text-main)">Deine Phasen</h2>
        <div id="settings-list">
            </div>
        <button class="action-button" onclick="saveSettings()" style="width:100%; margin-top:20px;">Einstellungen speichern</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
